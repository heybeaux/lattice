[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lattice-crewai"
version = "0.2.1"
description = "Lattice State Contract coordination layer for CrewAI workflows"
readme = "README.md"
keywords = ["lattice", "crewai", "ai-agents", "coordination", "state-contract", "circuit-breaker"]
license = { text = "MIT" }
requires-python = ">=3.10"
dependencies = [
    "python-ulid>=2.0.0",
    "jsonschema>=4.0.0",
    "openai>=1.0.0",
    "numpy>=1.24.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "crewai>=0.30.0",
]

[project.urls]
Homepage = "https://github.com/heybeaux/lattice"
Documentation = "https://heybeaux.github.io/lattice/"
Repository = "https://github.com/heybeaux/lattice/tree/main/packages/adapter-crewai"
Issues = "https://github.com/heybeaux/lattice/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/lattice_crewai"]
